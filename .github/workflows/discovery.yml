name: X Reply Discovery

on:
  schedule:
    # Every 2 hours UTC (covers 8am-10pm Pacific window and more)
    - cron: '0 16,18,20,22,0,2,4,6 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run discovery
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CUEAPI_API_KEY: ${{ secrets.CUEAPI_API_KEY }}
          GOVIND_X_USER_ID: ${{ secrets.GOVIND_X_USER_ID }}
        run: python -m agent.discovery

      - name: Commit state updates
        run: |
          git config user.name "x-reply-agent"
          git config user.email "bot@vector.build"
          git add data/
          git diff --cached --quiet || git commit -m "Update state after discovery run"
          git push
