name: Cooldown Update

on:
  schedule:
    # Every 2 hours, offset by 1 hour from discovery
    - cron: '0 17,19,21,23,1,3,5,7 * * *'
  workflow_dispatch:

jobs:
  update-cooldown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run cooldown update
        env:
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
          CUEAPI_API_KEY: ${{ secrets.CUEAPI_API_KEY }}
          GOVIND_X_USER_ID: ${{ secrets.GOVIND_X_USER_ID }}
        run: python -m agent.cooldown_update

      - name: Commit state updates
        run: |
          git config user.name "x-reply-agent"
          git config user.email "bot@vector.build"
          git add data/
          git diff --cached --quiet || git commit -m "Update cooldown state"
          git push
